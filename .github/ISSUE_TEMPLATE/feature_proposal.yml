name: Write an improvement proposal specification
description: Propose an improvement with a high level of detail.
body:

  - type: markdown
    attributes:
      value: |
        - Review the [Rules for submitting a proposal](https://github.com/godotengine/godot-proposals?tab=readme-ov-file#rules-for-submitting-a-proposal). If you fail to do so, we will close your proposal.
        - Search [existing proposals](https://github.com/godotengine/godot-proposals/issues?q=is%3Aissue) for related or duplicate proposals.

  - type: textarea
    attributes:
      label: Problem or limitation
      description: |+
        Describe the problem or limitation you are facing while working on your project.
        It is not enough to say a feature would be
        "nice" or "helpful". Describe how the lack of it is impacting your ability to make games.
        You should also describe which workarounds you tried and link related proposals. If you do
        not provide a well-founded motivation, your proposal will be closed.
      placeholder: |+
        <Example>
        The 3D selection tools are cumbersome to use.
        [more text here...]
    validations:
      required: true

  - type: textarea
    attributes:
      label: Proposed improvement
      description: |+
        Describe how to overcome the limitation you described above.
        Your proposal should describe the solution in enough detail that potential implementers
        do not have to guess or improvise. Include images, mock-ups, diagrams, code, if applicable.
        If your solution lacks in detail, is ambiguous, or otherwise low-effort, your proposal will be closed.
      placeholder: |+
        <Example>
        Add keyboard shortcuts to select groups of nodes quickly.
        When the user presses Ctrl + Shift + G, select all nodes that have the group...
        [more text here...]
    validations:
      required: true

  - type: checkboxes
    id: actionable
    attributes:
      label: Proposal review
      description: |+
        Please ask yourself honestly: Is your description above detailed enough for contributors to implement this improvement without improvising the details?
        If not, consider creating a [discussion](https://github.com/godotengine/godot-proposals/discussions) instead.
        Repeatedly posting unactionable or low-effort proposals may lead to restrictions on your ability to post new proposals.
      options:
        - label: Yes, this proposal is highly specific and actionable.
          required: true
